[mod-name]
winter-is-coming=Inverno a caminho

[mod-description]
winter-is-coming=Adiciona ciclos dinâmicos de inverno e verão com uma frente fria e móvel que congela e descongela o mapa gradualmente. Transforma corpos d'água naturais em gelo e vice-versa. E uma árvore de Natal como bônus :)

[mod-setting-name]
wic-summer-duration-hours=Duração do verão
wic-winter-duration-hours=Duração do inverno
wic-season-offset-hours=Compensação sazonal
wic-snow-front-speed-mps=Velocidade da frente de neve
wic-full-chunk-smoothing=Suavização completa de áreas
wic-snow-enabled=Efeitos da nevasca
wic-snowfront-radar-interference=Interferência de radar
wic-change-fish-collision-mask=Alterar caixa de colisão de peixes
wic-debug-mode=Modo de depuração

[mod-setting-description]
wic-summer-duration-hours=Quantas horas dura o verão.
wic-winter-duration-hours=Quantas horas dura o inverno.
wic-season-offset-hours=Desloca o ciclo da estação pelo número de horas fornecido.\nNota: para forçar a definição do tempo até a próxima estação, use /wic-next-season-in-minutes <minutos>.
wic-snow-front-speed-mps=Velocidade de avanço da frente de neve, em metros por segundo.
wic-full-chunk-smoothing=Suaviza as áreas repintando blocos inteiros atrás da frente de congelamento/descongelamento.
wic-snow-enabled=Permitir a queda de neve durante o clima de inverno.
wic-snowfront-radar-interference=Frentes de neve interrompem a operação do radar, ocultando áreas previamente reveladas no mapa.
wic-change-fish-collision-mask=Altera a camada de colisão dos peixes para que eles possam nadar sob o gelo. Desative esta modificação caso cause problemas de compatibilidade com outros mods.
wic-debug-mode=Exibe informações de depuração de blocos ao redor dos jogadores.
