[mod-setting-description]
crane-show-range=Controla como a área de funcionamento do guindaste será exibida ao sobrepor o cursor.\n[font=default-bold]Simples[/font] = circulo básico\n[font=default-bold]Complexo[/font] = blocos detalhados (requer mais uso da cpu com áreas maiores)
crane-no-technology=Guindastes não requerem pesquisa
crane-super-early=Obtêm o guindaste apenas com ciência de automação [item=automation-science-pack]
crane-energy-usage=Energia utilizada pelo guindaste
crane-offset-shadow=Desloca a sombra do braço do guindaste para igualar à sombra da base
crane-range=Distância em blocos a partir da base central
crane-requires-energy=Remove a necessidade de energia elétrica para guindastes
crane-rotation-speed=Velocidade de rotação em graus por tick
crane-trolley-speed=Velocidade de deslocamento em blocos por tick
crane-logistic-passive-provider-enabled=Permite que os guindastes utilizem o baú provedor passivo padrão [item=passive-provider-chest] como contêineres para pesquisa de itens
crane-logistic-storage-enabled=Permite que os guindastes utilizem o baú de armazenagem padrão [item=storage-chest] como contêineres para pesquisa de itens
crane-logistic-buffer-enabled=Permite que os guindastes utilizem o baú buffer padrão [item=buffer-chest] como contêineres para pesquisa de itens
crane-logistic-active-provider-enabled=Permite que os guindastes utilizem o baú provedor ativo padrão [item=active-provider-chest] como contêineres para pesquisa de itens
crane-highlight-mode=Controla como a área de trabalho do guindaste será destacada.\n[font=default-bold]Selecionado[/font] = Apenas quando selecionado.\n[font=default-bold]Tudo na área[/font] = Todos os guindastes dentro do alcance especificado pelo jogador.
crane-highlight-range=O raio (em blocos) ao redor do jogador para procurar guindastes a serem destacados ao usar o modo "tudo na área" ou "ao segurar fantasma".
crane-highlight-alt-mode-only=Exibe a área de trabalho destacada do guindaste quando o modo alt (informações detalhadas) estiver ativo.
crane-highlight-ghost-in-hand=Exibe a área de trabalho destacada do guindaste quando o jogador tiver um fantasma de guindaste na mão.
crane-debug=Adiciona informações de depuração aos guindastes (não recomendado)

