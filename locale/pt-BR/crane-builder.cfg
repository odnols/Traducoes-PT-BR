[tips-and-tricks-item-description]
crane-builder-tip=O [item=crane-builder] procura por [entity=entity-ghost] em sua área de trabalho. Se encontrar um [item=crane-provider-chest] em sua área de trabalho com um item requisitado, coletará o item e construirá o fantasma.