[mod-setting-description]
cargo-drone-inventory-size=Altera o tamanho do armazenamento interno dos [item=cargo-drone] Drones de carga.
cargo-drone-fuel-inventory-size=Altera o tamanho do tanque de combustível dos [item=cargo-drone] Drones de carga.
cargo-drone-burnt-result-inventory-size=Altera o tamanho dos restos de combustível dos [item=cargo-drone] Drones de carga.\nNote que os [item=cargo-drone] Drones de carga irão tentar descarregar combustíveis utilizados em [item=cargo-drone-mooring-constant-combinator-refueler] ancoradouros de abastecimento e não irão desacoplar até que seus inventários de restos de combustível estejam vazios.\n[item=cargo-drone] Os drones de carga não levam em consideração a quantidade de resíduos queimados ao decidir quando se dirigir para o [item=cargo-drone-mooring-constant-combinator-refueler] ancoradouro abastecedor.
cargo-drone-fuel-interrupt-percentage=A porcentagem de combustível que fará com que o drone de carga seja interrompido e se dirija em direção a um [item=cargo-drone-mooring-constant-combinator-refueler] Ancoradouro abastecedor.
cargo-drone-stuck-at-refueler-seconds-alert=A quantidade em segundos que um [item=cargo-drone] Drone de carga precisa ter acoplado em um [item=cargo-drone-mooring-constant-combinator-refueler] Ancoradouro abastecedor antes que um alerta seja emitido sobre o [item=cargo-drone] Drone de carga preso.\nDefina para 0 para desativar.
cargo-drone-heuristic-target-count-cost=Utilizado para determinar a melhor amarração para um drone. A escolha da amarração baseia-se na distância, mas com um custo adicional para cada amarração [item=cargo-drone] Drone de carga atualmente designado para se dirigir ao ancoradouro por esta distância. Valores mais altos fazem com que os [item=cargo-drone] Drones de carga se espalhem mais, enquanto valores mais baixos fazem com que se dirijam para o mesmo local.
cargo-drone-min-schedule-interval=A quantidade mínima de ticks que devem passar antes de tentar agendar tarefas para os [item=cargo-drone] Drones de carga.\nUm valor mais alto pode fazer com que demore mais para os [item=cargo-drone] Drones de carga serão designados para novas tarefas, mas isso pode aumentar o tempo entre picos de atraso devido ao agendamento. Um valor menor pode tornar os [item=cargo-drone] Drones de carga serem alocados mais rapidamente, mas isso pode diminuir o tempo entre os picos de atraso no agendamento.
