[cargo-drone-migration]
warning-wires-removed=Alerta. Devido a um problema de migração durante a atualização do módulo cargo-drone de uma versão anterior à 1.4.0, todos os fios do circuito conectados aos ancoradouros foram removidos e precisarão ser reconfigurados. Observe que o limite e a prioridade dos drones agora devem ser configurados nos ancoradouros. Pedimos desculpas pelo inconveniente.
warning-read-inventory-output-removed= Alerta. O inventário alvo das amarras foi alterado na versão 1.5.0 e agora é configurado na interface gráfica da amarra. Isso significa que as amarras de abastecimento não exibirão mais o inventário lido, portanto, qualquer reabastecedor que dependa desse comportamento deixará de funcionar.

