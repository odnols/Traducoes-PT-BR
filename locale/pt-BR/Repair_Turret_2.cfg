[mod-setting-description]
repair_turret_multi_build=Quando ativo, cada torre de reparo poderá construir/reparar/desmonstar até 5 entidades por atualização. Desative se você experenciar problemas de UPS com muitas torres.
repair_turret_charging_enabled=Permite que torres de reparo recarreguem robôs. Necessita reiniciar o jogo.
repair_turret_charging_ports=Quantidade de robôs que podem recarregar ao mesmo tempo em uma torre de reparo.
repair_turret_charging_rate=Energia concedida por segundo para cada robô recarregando.
repair_turret_construct_effect=Efeito visual ao construir fantasmas. "padrão" exibe o raio, "nenhum" desativa o efeito. Reduzir os efeitos pode mlehorar a performance da GPU.
repair_turret_deconstruct_effect=Efeito visual ao desconstruir entidades. "padrão" exibe o tiro + raio, "raio" exibe apenas o raio estático, "nenhum" desativa todos os efeitos. Reduzir os efeitos pode mlehorar a performance da GPU.